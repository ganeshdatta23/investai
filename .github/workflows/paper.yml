name: paper-trade

# Free serverless deploy: every NSE trading evening, run the engine in PAPER mode,
# update the persistent ledger (state/) and the dashboard (docs/), and commit them.
# NO real orders are ever placed.

on:
  schedule:
    - cron: "30 10 * * 1-5"   # 16:00 IST (after the 15:30 close), Mon-Fri
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run paper engine + render dashboard + email summary
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python -m investai dashboard --out docs --email || true   # never fail the deploy on a flaky feed/email

      - name: Publish research docs alongside the dashboard
        run: |
          cp -f CONCLUSION.md docs/ 2>/dev/null || true
          cp -f RESEARCH_LOG.md docs/ 2>/dev/null || true

      - name: Commit updated paper state + dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "no changes to commit"; exit 0
          fi
          git commit -m "paper run $(date -u +%Y-%m-%d)"
          # The email already went out in the previous step; persisting state is
          # best-effort. Rebase onto any remote changes and retry to dodge races.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "state persisted"; exit 0
            fi
            echo "push attempt $attempt raced with remote; retrying..."; sleep 5
          done
          echo "could not persist state this run (email was still sent); next run catches up"
